apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: CheckGroupV2
metadata:
  name: e2e-checkgroupv2
  annotations:
    meta.upbound.io/example-id: checks/v1alpha1/checkgroupv2
spec:
  forProvider:
    name: e2e-checkgroupv2
    activated: true
    concurrency: 3
    tags:
      - e2e-test
    enforceLocations:
      - enabled: true
        locations:
          - eu-west-1
          - us-east-1
  providerConfigRef:
    name: default

apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: PlaywrightCheckSuite
metadata:
  name: e2e-playwright-suite
  annotations:
    meta.upbound.io/example-id: checks/v1alpha1/playwrightchecksuite
spec:
  forProvider:
    activated: true
    bundle:
      - metadata: "{}"
    frequency: 15
    locations:
      - eu-west-1
    name: E2E Playwright Check Suite
    useGlobalAlertSettings: true
  providerConfigRef:
    name: default

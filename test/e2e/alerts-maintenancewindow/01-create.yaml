apiVersion: alerts.checkly.crossplane.io/v1alpha1
kind: MaintenanceWindow
metadata:
  name: e2e-maintenance-window
  annotations:
    meta.upbound.io/example-id: alerts/v1alpha1/maintenancewindow
spec:
  forProvider:
    name: E2E Weekly maintenance
    startsAt: "2025-01-05T02:00:00Z"
    endsAt: "2025-01-05T04:00:00Z"
    repeatUnit: WEEK
    repeatInterval: 1
    tags:
      - e2e-test
  providerConfigRef:
    name: default

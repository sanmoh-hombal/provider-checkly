apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: URLMonitor
metadata:
  name: homepage-url-monitor
  namespace: default
  annotations:
    meta.upbound.io/example-id: checks/v1alpha1/urlmonitor
spec:
  forProvider:
    name: homepage-url-monitor
    activated: true
    frequency: 5
    locations:
      - us-east-1
      - eu-west-1
    request:
      - url: https://example.com
    tags:
      - managed-by-crossplane
  providerConfigRef:
    name: default

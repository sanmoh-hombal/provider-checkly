apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: Heartbeat
metadata:
  name: worker-heartbeat
  namespace: default
  annotations:
    meta.upbound.io/example-id: checks/v1alpha1/heartbeat
spec:
  forProvider:
    name: worker-heartbeat
    activated: true
    tags:
      - managed-by-crossplane
    heartbeat:
      - period: 60
        periodUnit: seconds
        grace: 120
        graceUnit: seconds
  providerConfigRef:
    name: default

apiVersion: infra.checkly.m.crossplane.io/v1alpha1
kind: EnvironmentVariable
metadata:
  name: api-base-url
  namespace: default
  annotations:
    meta.upbound.io/example-id: infra/v1alpha1/environmentvariable
spec:
  forProvider:
    key: API_BASE_URL
    valueSecretRef:
      key: value
      name: envvar-api-base-url
      namespace: default
    locked: false
  providerConfigRef:
    name: default

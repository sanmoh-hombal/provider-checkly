apiVersion: infra.checkly.m.crossplane.io/v1alpha1
kind: ClientCertificate
metadata:
  name: client-cert-example
  namespace: default
  annotations:
    meta.upbound.io/example-id: infra/v1alpha1/clientcertificate
spec:
  forProvider:
    host: api.example.com
    certificateSecretRef:
      name: tls-cert
      key: tls.crt
    privateKeySecretRef:
      name: tls-cert
      key: tls.key
  providerConfigRef:
    kind: ProviderConfig
    name: default

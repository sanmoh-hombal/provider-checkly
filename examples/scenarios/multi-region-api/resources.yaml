---
# Maintenance window — weekly Sunday deploy window
apiVersion: alerts.checkly.crossplane.io/v1alpha1
kind: MaintenanceWindow
metadata:
  name: deploy-window
  namespace: default
  labels:
    scenario: multi-region-api
spec:
  forProvider:
    name: Weekly Sunday deploy window
    startsAt: "2025-01-05T02:00:00Z"
    endsAt: "2025-01-05T04:00:00Z"
    repeatUnit: WEEK
    repeatInterval: 1
    tags:
      - api
      - multi-region
  providerConfigRef:
    name: default

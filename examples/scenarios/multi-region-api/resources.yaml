---
# Check group for all API endpoints
apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: CheckGroup
metadata:
  name: api-checks
  namespace: default
  labels:
    scenario: multi-region-api
spec:
  forProvider:
    name: api-checks
    activated: true
    concurrency: 3
    locations:
      - eu-west-1
      - us-east-1
      - ap-south-1
      - us-west-1
      - eu-central-1
    tags:
      - api
      - multi-region
      - managed-by-crossplane
  providerConfigRef:
    name: default
---
# Check 1 — /api/users
apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: Check
metadata:
  name: api-users
  namespace: default
  labels:
    scenario: multi-region-api
spec:
  forProvider:
    name: api-users
    activated: true
    frequency: 5
    type: API
    locations:
      - eu-west-1
      - us-east-1
      - ap-south-1
    tags:
      - api
      - multi-region
      - managed-by-crossplane
    request:
      - method: GET
        url: https://api.example.com/api/users
        assertion:
          - source: STATUS_CODE
            property: ""
            comparison: EQUALS
            target: "200"
  providerConfigRef:
    name: default
---

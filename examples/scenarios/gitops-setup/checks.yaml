---
# Check 1 — user-service
apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: Check
metadata:
  name: svc-user
  namespace: default
  labels:
    scenario: gitops-setup
spec:
  forProvider:
    name: svc-user
    activated: true
    frequency: 5
    type: API
    locations: [eu-west-1, us-east-1]
    tags: [gitops, managed-by-crossplane]
    request:
      - method: GET
        url: https://api.example.com/user/healthz
        assertion:
          - source: STATUS_CODE
            property: ""
            comparison: EQUALS
            target: "200"
  providerConfigRef:
    name: default

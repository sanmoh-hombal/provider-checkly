---
# Playwright code bundle — pre-built test archive
apiVersion: checks.checkly.crossplane.io/v1alpha1
kind: PlaywrightCodeBundle
metadata:
  name: e2e-bundle
  namespace: default
  labels:
    scenario: playwright-full-suite
spec:
  forProvider:
    prebuiltArchive:
      - file: ./hello-world.tar.gz
  providerConfigRef:
    name: default
---
# Playwright check suite — runs the bundle on a schedule
apiVersion: checks.checkly.m.crossplane.io/v1alpha1
kind: PlaywrightCheckSuite
metadata:
  name: e2e-suite
  namespace: default
  labels:
    scenario: playwright-full-suite
spec:
  forProvider:
    name: E2E Playwright Suite
    activated: true
    frequency: 10
    locations:
      - eu-west-1
    useGlobalAlertSettings: true
    bundle:
      - idRef:
          name: e2e-bundle
        metadata: "{}"
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
# Trigger — on-demand execution via webhook
apiVersion: triggers.checkly.m.crossplane.io/v1alpha1
kind: TriggerCheck
metadata:
  name: e2e-trigger
  namespace: default
  labels:
    scenario: playwright-full-suite
spec:
  forProvider:
    checkId: "00000000-0000-0000-0000-000000000000"
  providerConfigRef:
    kind: ProviderConfig
    name: default
  writeConnectionSecretToRef:
    name: e2e-trigger-conn

    checkly_check_group_v2:
        subCategory: ""
        description: Check groups organize related checks together and allow optional shared configuration. Unlike checkly_check_group (v1), which always imposed implicit defaults for various settings, checkly_check_group_v2 does not override any check settings by default. A group can be as minimal as just a name. Use the optional enforce_* blocks only when you explicitly want the group to override individual check settings. The new checkly_check_group_v2 resource should always be preferred over the old checkly_check_group resource.
        name: checkly_check_group_v2
        title: checkly_check_group_v2 Resource - terraform-provider-checkly
        examples:
            - name: just-a-folder
              manifest: |-
                {
                  "name": "Just a Folder"
                }
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
            - name: production-api
              manifest: |-
                {
                  "activated": true,
                  "api_check_defaults": [
                    {
                      "assertion": [
                        {
                          "comparison": "LESS_THAN",
                          "source": "STATUS_CODE",
                          "target": "400"
                        },
                        {
                          "comparison": "LESS_THAN",
                          "source": "RESPONSE_TIME",
                          "target": "3000"
                        }
                      ],
                      "basic_auth": [
                        {
                          "password": "pass",
                          "username": "admin"
                        }
                      ],
                      "headers": {
                        "Content-Type": "application/json",
                        "X-Api-Key": "{{API_TOKEN}}"
                      },
                      "query_parameters": {
                        "version": "v2"
                      },
                      "url": "https://api.example.com/"
                    }
                  ],
                  "concurrency": 5,
                  "default_runtime": [
                    {
                      "runtime_id": "2024.02"
                    }
                  ],
                  "enforce_alert_settings": [
                    {
                      "alert_channel_subscription": [
                        {
                          "activated": true,
                          "channel_id": 1234
                        }
                      ],
                      "alert_settings": [
                        {
                          "escalation_type": "RUN_BASED",
                          "parallel_run_failure_threshold": [
                            {
                              "enabled": true,
                              "percentage": 50
                            }
                          ],
                          "reminders": [
                            {
                              "amount": 3,
                              "interval": 10
                            }
                          ],
                          "run_based_escalation": [
                            {
                              "failed_run_threshold": 2
                            }
                          ]
                        }
                      ],
                      "enabled": true
                    }
                  ],
                  "enforce_locations": [
                    {
                      "enabled": true,
                      "locations": [
                        "us-east-1",
                        "eu-west-1",
                        "ap-southeast-1"
                      ],
                      "private_locations": [
                        "my-datacenter"
                      ]
                    }
                  ],
                  "enforce_retry_strategy": [
                    {
                      "enabled": true,
                      "retry_strategy": [
                        {
                          "base_backoff_seconds": 30,
                          "max_duration_seconds": 300,
                          "max_retries": 3,
                          "same_region": true,
                          "type": "LINEAR"
                        }
                      ]
                    }
                  ],
                  "enforce_scheduling_strategy": [
                    {
                      "enabled": true,
                      "run_parallel": true
                    }
                  ],
                  "environment_variable": [
                    {
                      "key": "BASE_URL",
                      "locked": false,
                      "value": "https://api.example.com"
                    },
                    {
                      "key": "API_TOKEN",
                      "locked": true,
                      "secret": true,
                      "value": "super-secret-token"
                    }
                  ],
                  "muted": false,
                  "name": "Production API",
                  "setup_script": [
                    {
                      "inline_script": "// Runs before every API check in this group\nconsole.log(\"Setting up...\")\n"
                    }
                  ],
                  "tags": [
                    "production",
                    "api"
                  ],
                  "teardown_script": [
                    {
                      "inline_script": "// Runs after every API check in this group\nconsole.log(\"Tearing down...\")\n"
                    }
                  ]
                }
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
            - name: retry-on-network-errors
              manifest: |-
                {
                  "enforce_retry_strategy": [
                    {
                      "enabled": true,
                      "retry_strategy": [
                        {
                          "base_backoff_seconds": 10,
                          "max_duration_seconds": 600,
                          "max_retries": 5,
                          "only_on": [
                            {
                              "network_error": true
                            }
                          ],
                          "same_region": false,
                          "type": "EXPONENTIAL"
                        }
                      ]
                    }
                  ],
                  "name": "Retry on Network Errors Only"
                }
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
            - name: time-based-alerts
              manifest: |-
                {
                  "enforce_alert_settings": [
                    {
                      "alert_settings": [
                        {
                          "escalation_type": "TIME_BASED",
                          "reminders": [
                            {
                              "amount": 5,
                              "interval": 15
                            }
                          ],
                          "time_based_escalation": [
                            {
                              "minutes_failing_threshold": 10
                            }
                          ]
                        }
                      ],
                      "enabled": true
                    }
                  ],
                  "name": "Time-Based Alert Escalation"
                }
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
            - name: use-global-alerts
              manifest: |-
                {
                  "enforce_alert_settings": [
                    {
                      "enabled": true,
                      "use_global_alert_settings": true
                    }
                  ],
                  "name": "Use Global Alert Settings"
                }
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
            - name: with-alert-channels
              manifest: |-
                {
                  "enforce_alert_settings": [
                    {
                      "alert_channel_subscription": [
                        {
                          "activated": true,
                          "channel_id": "${checkly_alert_channel.email.id}"
                        },
                        {
                          "activated": true,
                          "channel_id": "${checkly_alert_channel.slack.id}"
                        }
                      ],
                      "alert_settings": [
                        {
                          "escalation_type": "RUN_BASED",
                          "reminders": [
                            {
                              "amount": 0,
                              "interval": 5
                            }
                          ],
                          "run_based_escalation": [
                            {
                              "failed_run_threshold": 1
                            }
                          ]
                        }
                      ],
                      "enabled": true
                    }
                  ],
                  "name": "Group with Alert Channels"
                }
              references:
                enforce_alert_settings.alert_channel_subscription.channel_id: checkly_alert_channel.slack.id
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
            - name: no-retries
              manifest: |-
                {
                  "enforce_retry_strategy": [
                    {
                      "enabled": true,
                      "retry_strategy": [
                        {
                          "type": "NO_RETRIES"
                        }
                      ]
                    }
                  ],
                  "name": "No Retries Group"
                }
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
            - name: single-retry
              manifest: |-
                {
                  "enforce_retry_strategy": [
                    {
                      "enabled": true,
                      "retry_strategy": [
                        {
                          "base_backoff_seconds": 10,
                          "same_region": true,
                          "type": "SINGLE_RETRY"
                        }
                      ]
                    }
                  ],
                  "name": "Single Retry Group"
                }
              dependencies:
                checkly_alert_channel.email: |-
                    {
                      "email": [
                        {
                          "address": "alerts@example.com"
                        }
                      ]
                    }
                checkly_alert_channel.slack: |-
                    {
                      "slack": [
                        {
                          "channel": "#alerts",
                          "url": "https://example.com/slack-webhook-placeholder"
                        }
                      ]
                    }
        argumentDocs:
            activated: (Boolean) Determines whether activated checks in the group should run or not. Deactivating the group will prevent all checks in the group from running, regardless of their activated state. (Default true).
            alert_channel_subscription: (Block Set) An array of channel IDs and whether they're activated or not. If you don't set at least one alert channel subscription for your check, we won't be able to alert you even if it starts failing. (see below for nested schema)
            alert_settings: '(Block List, Max: 1) Determines the alert escalation policy for the check. (see below for nested schema)'
            alert_threshold: (Number) No longer available.
            amount: (Number) Number of reminder notifications to send. Possible values are 0, 1, 2, 3, 4, 5, and 100000 (0 to disable, 100000 for unlimited). (Default 0).
            api_check_defaults: '(Block Set, Max: 1) (see below for nested schema)'
            assertion: (Block Set) (see below for nested schema)
            base_backoff_seconds: (Number) The number of seconds to wait before the first retry attempt. (Default 60).
            basic_auth: '(Block Set, Max: 1) (see below for nested schema)'
            channel_id: (Number) The ID of the alert channel.
            comparison: (String) The type of comparison to be executed between expected and actual value of the assertion. Possible values EQUALS, NOT_EQUALS, HAS_KEY, NOT_HAS_KEY, HAS_VALUE, NOT_HAS_VALUE, IS_EMPTY, NOT_EMPTY, GREATER_THAN, LESS_THAN, CONTAINS, NOT_CONTAINS, IS_NULL, and NOT_NULL.
            concurrency: (Number) Determines the number of checks to run concurrently when triggering the check group via CI/CD or the API. (Default 1).
            default_runtime: '(Block List, Max: 1) Sets a default runtime for the group. Used as a fallback when a check belonging to the group has no runtime set. Takes precedence over the account default runtime. (see below for nested schema)'
            enabled: (Boolean) Determines whether the enforced alert settings should be active.
            enforce_alert_settings: '(Block List, Max: 1) Enforces alert settings for the whole group. Overrides check configuration. (see below for nested schema)'
            enforce_locations: '(Block List, Max: 1) Enforces public and private locations for the whole group. Overrides check configuration. (see below for nested schema)'
            enforce_retry_strategy: '(Block List, Max: 1) Enforces a retry strategy for the whole group. Overrides check configuration. (see below for nested schema)'
            enforce_scheduling_strategy: '(Block List, Max: 1) Enforces a scheduling strategy for the whole group. Overrides check configuration. (see below for nested schema)'
            environment_variable: (Block List) Insert environment variables into the runtime environment of checks in the group. Only relevant for check types that support environment variables. Use global environment variables whenever possible. (see below for nested schema)
            escalation_type: (String) Determines the type of escalation to use. Possible values are RUN_BASED and TIME_BASED. (Default RUN_BASED).
            failed_run_threshold: (Number) Send an alert notification after the given number of consecutive check runs have failed. Possible values are between 1 and 5. (Default 1).
            headers: (Map of String)
            id: (String) The ID of this resource.
            inline_script: (String) A valid piece of Node.js code.
            interval: (Number) Interval between reminder notifications in minutes. Possible values are 5, 10, 15, and 30. (Default 5).
            key: (String) The name of the environment variable or secret.
            locations: (Set of String) An array of one or more data center locations where to run the checks.
            locked: (Boolean) If true, the value is not shown by default, but it can be accessed. (Default false).
            max_duration_seconds: (Number) The total amount of time to continue retrying the check/monitor (maximum 600 seconds). Available when type is FIXED, LINEAR, or EXPONENTIAL. (Default 600).
            max_retries: (Number) The maximum number of times to retry the check/monitor. Value must be between 1 and 10. Available when type is FIXED, LINEAR, or EXPONENTIAL. (Default 2).
            minutes_failing_threshold: (Number) Send an alert notification after the check has been failing for the given amount of time (in minutes). Possible values are 5, 10, 15, and 30. (Default 5).
            muted: (Boolean) Determines if any notifications will be sent out when a check in this group fails and/or recovers. Muting the group will deactivate all notifications for all checks in the group, regardless of their muted state. (Default false).
            name: (String) The name of the check group.
            network_error: (Boolean) When true, retry only if the cause of the failure is a network error. (Default false).
            only_on: '(Block List, Max: 1) Apply the retry strategy only if the defined conditions match. (see below for nested schema)'
            parallel_run_failure_threshold: (Block List) Configuration for parallel run failure threshold. (see below for nested schema)
            password: (String)
            percentage: (Number) Percentage of runs that must fail to trigger alert. Possible values are 10, 20, 30, 40, 50, 60, 70, 80, 90, and 100. (Default 10).
            private_locations: (Set of String) An array of one or more private locations slugs.
            property: (String)
            query_parameters: (Map of String)
            reminders: (Block List) Defines how often to send reminder notifications after initial alert. (see below for nested schema)
            retry_strategy: '(Block List, Min: 1, Max: 1) A strategy for retrying failed check/monitor runs. (see below for nested schema)'
            run_based_escalation: (Block List) Configuration for run-based escalation. (see below for nested schema)
            run_parallel: (Boolean) Determines if the checks in the group should run in all selected locations in parallel or round-robin.
            runtime_id: (String) The runtime ID.
            same_region: (Boolean) Whether retries should be run in the same region as the initial check/monitor run. (Default true).
            secret: (Boolean) If true, the value will never be visible. (Default false).
            setup_script: '(Block List, Max: 1) A script to run in the setup phase of an API check. Runs in addition to the check''s own setup script. (see below for nested schema)'
            snippet_id: (Number) The ID of a code snippet. Code snippets are not available for new plans.
            source: (String) The source of the asserted value. Possible values STATUS_CODE, JSON_BODY, HEADERS, TEXT_BODY, and RESPONSE_TIME.
            ssl_certificates: (Block Set, Deprecated) (see below for nested schema)
            tags: (Set of String) Additional tags to append to all checks in the group.
            target: (String)
            teardown_script: '(Block List, Max: 1) A script to run in the teardown phase of an API check. Runs in addition to the check''s own teardown script. (see below for nested schema)'
            time_based_escalation: (Block List) Configuration for time-based escalation. (see below for nested schema)
            type: (String) Determines which type of retry strategy to use. Possible values are FIXED, LINEAR, EXPONENTIAL, SINGLE_RETRY, and NO_RETRIES.
            url: (String) The base url for this group which you can reference with the GROUP_BASE_URL variable in all group checks.
            use_global_alert_settings: (Boolean) Whether to use account level alert settings instead of the group's alert settings.Default (false).
            username: (String)
            value: (String) The value of the environment variable or secret.
        importStatements: []
    checkly_client_certificate:
        subCategory: ""
        description: Use client certificates to authenticate your API checks to APIs that require mutual TLS (mTLS) authentication, or any other authentication scheme where the requester needs to provide a certificate. Each client certificate is specific to a domain name, e.g. acme.com and will be used automatically by any API checks targeting that domain. Changing the value of any attribute forces a new resource to be created.
        name: checkly_client_certificate
        title: checkly_client_certificate Resource - terraform-provider-checkly
        examples:
            - name: test
              manifest: |-
                {
                  "certificate": "${file(\"${path.module}/cert.pem\")}",
                  "host": "*.acme.com",
                  "passphrase": "${var.acme_client_certificate_passphrase}",
                  "private_key": "${file(\"${path.module}/key.pem\")}",
                  "trusted_ca": "${file(\"${path.module}/ca.pem\")}"
                }
              references:
                passphrase: var.acme_client_certificate_passphrase
        argumentDocs:
            certificate: (String) The client certificate in PEM format.
            host: (String) The host domain that the certificate should be used for.
            id: (String) The ID of this resource.
            passphrase: (String, Sensitive) Passphrase for the private key.
            private_key: (String) The private key for the certificate in PEM format.
            trusted_ca: (String) PEM formatted bundle of CA certificates that the client should trust. The bundle may contain many CA certificates.
        importStatements: []
    checkly_dashboard:
        subCategory: ""
        name: checkly_dashboard
        title: checkly_dashboard Resource - terraform-provider-checkly
        examples:
            - name: dashboard_1
              manifest: |-
                {
                  "custom_domain": "status.example.com",
                  "custom_url": "checkly",
                  "header": "Public dashboard",
                  "hide_tags": false,
                  "logo": "https://www.checklyhq.com/logo.png",
                  "paginate": false,
                  "pagination_rate": 30,
                  "refresh_rate": 60,
                  "tags": [
                    "production"
                  ],
                  "width": "FULL"
                }
        argumentDocs:
            checks_per_page: (Number) Determines how many checks to show per page. Possible values are between 1 and 20. (Default 15).
            custom_css: (String) Custom CSS to be applied to the dashboard.
            custom_domain: (String) A custom user domain, e.g. 'status.example.com'. See the docs on updating your DNS and SSL usage.
            custom_url: (String) A subdomain name under 'checklyhq.com'. Needs to be unique across all users.
            description: (String) HTML  description for the dashboard.
            enable_incidents: (Boolean) Enable incident support for the dashboard. (Default false).
            expand_checks: (Boolean) Expand or collapse checks on the dashboard. (Default false).
            favicon: (String) A URL pointing to an image file to use as browser favicon.
            header: (String) A piece of text displayed at the top of your dashboard.
            hide_tags: (Boolean) Show or hide the tags on the dashboard. (Default false).
            id: (String) The ID of this resource.
            is_private: (Boolean) Set your dashboard as private and generate key.
            key: (String, Sensitive) The access key when the dashboard is private.
            link: (String) A link to for the dashboard logo.
            logo: (String) A URL pointing to an image file to use for the dashboard logo.
            paginate: (Boolean) Determines if pagination is on or off. (Default true).
            pagination_rate: (Number) How often to trigger pagination in seconds. Possible values 30, 60 and 300. (Default 60).
            refresh_rate: (Number) How often to refresh the dashboard in seconds. Possible values 60, '300' and 600. (Default 60).
            show_check_run_links: (Boolean) Show or hide check run links on the dashboard. (Default false).
            show_header: (Boolean) Show or hide header and description on the dashboard. (Default true).
            show_p95: (Boolean) Show or hide the P95 stats on the dashboard. (Default true).

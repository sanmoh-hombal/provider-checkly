name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package/crds/**"
      - "examples-generated/**"
      - "scripts/gen-resource-docs.sh"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install mkdocs-material
        run: pip install mkdocs-material==9.7.6

      - name: Generate resource docs
        run: python3 scripts/gen-resource-docs.sh

      - name: Build site
        run: mkdocs build --strict --config-file docs/mkdocs.yml

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.event.deployment.payload.web_url || '' }}
    steps:
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

name: E2E

on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC daily
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      CHECKLY_API_KEY_SANDBOX: ${{ secrets.CHECKLY_API_KEY_SANDBOX }}
      CHECKLY_ACCOUNT_ID_SANDBOX: ${{ secrets.CHECKLY_ACCOUNT_ID_SANDBOX }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: helm/kind-action@v1

      - name: Run E2E
        run: ./scripts/e2e.sh

      - name: Capture e2e log on failure
        if: failure()
        run: |
          if [[ -f _output/provider-e2e.log ]]; then
            cp _output/provider-e2e.log e2e.log
          else
            echo "No provider log found. Check workflow output above." > e2e.log
          fi

      - name: Open issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "E2E failure on ${{ github.run_id }}"
          content-filepath: e2e.log
          labels: e2e,bug
